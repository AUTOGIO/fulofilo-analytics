# FulôFiló — Visual POS Dataset Configuration
# YOLOv11 (Ultralytics) — Product Detection Model
#
# HOW TO USE:
# 1. Add product images to: visual_pos/images/train/ and visual_pos/images/val/
# 2. Add YOLO-format label files to: visual_pos/labels/train/ and visual_pos/labels/val/
# 3. Run: uv run python visual_pos/train.py
#
# LABEL FORMAT (YOLO):
# <class_id> <x_center> <y_center> <width> <height>  (all values 0.0–1.0, normalized)
#
# RECOMMENDED TOOL FOR LABELING:
# - Roboflow (free tier): https://roboflow.com
# - Label Studio (self-hosted): https://labelstud.io

path: ../visual_pos   # Root of the dataset (relative to this file)
train: images/train   # Training images
val: images/val       # Validation images

# Number of classes
nc: 48

# Class names — mapped to SKUs in product_catalog.csv
names:
